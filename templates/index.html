<!DOCTYPE html>
<html>
    <head>
        <title>PyTalk</title>
        <link rel="stylesheet" href="../static/styles.css">
    </head>

    <body>

        <div class="container">

            

            

            <div class="sidebar-area">

                <img src="../static/images/logo_colour.png" alt="Logo" class="logo">
                <p id="version" class="instructions"></p>

                <div class="sidebar">
                    <h3>Channels</h3>
                    <ul id="channel-list">
                        {% for channel in channels %}
                        <li class="channel-item" data-room="{{ channel.name.lower() }}">{{ channel.name }}</li>
                        {% endfor %}
                    </ul>
                </div>

                <button onclick="openSettings()">Settings</button>
                
            </div>

            <div class="main-content">

                <div id="settingsModal" class="modal">
                    <div class="modal-content">
                        <h2>Settings</h2>

                            <button onclick="changeColor('#42a5f5')">Default (Blue)</button>
                            <button onclick="changeColor('#8B5CF6')">Purple</button>
                            <button onclick="changeColor('#30D158')">Green</button>
                            <button onclick="changeColor('#14B8A6')">Teal</button>
                            <button onclick="changeColor('#6366F1')">Indigo</button>

                            <br><br>

                        <button onclick="closeSettings()">Close</button>
                    </div>
                </div>
                <div id="auth-section">
                    <h3>Login</h3>
                    <input id="login-username" placeholder="Username" type="text">
                    <input id="login-password" placeholder="Password" type="password">
                    <button onclick="login()">Login</button>
                    <button onclick="showRegister()">Register</button>
                    <p id="auth-message"></p>
                </div>

                <div id="register-section" style="display: none;">
                    <h3>Register</h3>
                    <input id="register-username" placeholder="Username" type="text">
                    <input id="register-password" placeholder="Password" type="password">
                    <input id="register-confirm-password" placeholder="Confirm Password" type="password">
                    <button onclick="register()">Register</button>
                    <button onclick="showLogin()">Back to Login</button>
                    <p id="register-message"></p>
                </div>
                
                <div id="header-area" style="display: none;">
                    <p>Welcome, <span id="current-user"></span>! <button onclick="logout()">Logout</button></p>
                    <p class="instructions">Click on a channel to join</p>
                </div>

                <div id="chat-section" style="display: none;">

                    <hr>

                    <div id="chat-area">
                        <div id="chat"></div>
                    </div>

                    <br>

                    
                </div>

                <div id="message-input" style="display: none;">
                    <input id="message" class="message" placeholder="Message">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

        <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
        <script src="/static/chat.js"></script>

    </body>
</html>
